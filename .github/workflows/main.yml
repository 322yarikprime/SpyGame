name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk wget

      - name: Install Android SDK command line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir cmdline-tools
          mv cmdline-tools-temp cmdline-tools/latest
          rm commandlinetools-linux-11076708_latest.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install SDK components
        run: |
          # Принимаем лицензии
          yes | sdkmanager --licenses
          # Устанавливаем нужные компоненты
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" "ndk;25b"

      - name: Install buildozer
        run: |
          pip install buildozer cython

      - name: Build APK
        run: |
          # Создаём buildozer.spec
          cat > buildozer.spec <<EOF
[app]
title = SpyGame
package.name = spygame
package.domain = org.yarik
source.dir = .
source.include_exts = py,png,jpg,gif,mp3,ttf
version = 0.1
requirements = python3==3.8.13,pygame-ce,sdl2,sdl2_image,sdl2_mixer,sdl2_ttf
orientation = landscape
fullscreen = 1
android.permissions = INTERNET
android.api = 30
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a, armeabi-v7a
android.add_assets = images, music
android.presplash = images/menufon.png
android.icon = images/menufon.png

[buildozer]
log_level = 2
android.accept_sdk_license = True
EOF
          # Указываем пути к уже установленному SDK и NDK
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25b
          export PATH=$ANDROID_HOME/platform-tools:$PATH
          # Запускаем сборку
          buildozer android debug deploy run

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyGame
          path: bin/*.apk
