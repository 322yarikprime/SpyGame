name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk

      - name: Install buildozer
        run: |
          pip install buildozer cython

      - name: Accept Android SDK licenses
        run: |
          # Создаём папку для SDK, если её нет
          mkdir -p ~/.android
          echo "### User Sources for Android SDK" > ~/.android/repositories.cfg
          # Принимаем все лицензии автоматически
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          # Создаём buildozer.spec на лету
          cat > buildozer.spec <<EOF
[app]
title = SpyGame
package.name = spygame
package.domain = org.yarik
source.dir = .
source.include_exts = py,png,jpg,gif,mp3,ttf
version = 0.1
requirements = python3==3.8.13,pygame-ce,sdl2,sdl2_image,sdl2_mixer,sdl2_ttf
orientation = landscape
fullscreen = 1
android.permissions = INTERNET
android.api = 30
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a, armeabi-v7a
android.add_assets = images, music
android.presplash = images/menufon.png
android.icon = images/menufon.png

[buildozer]
log_level = 2
android.accept_sdk_license = True
EOF
          # Устанавливаем переменные окружения для SDK
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/tools/bin:$PATH
          # Запускаем сборку
          buildozer android debug deploy run

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyGame
          path: bin/*.apk
