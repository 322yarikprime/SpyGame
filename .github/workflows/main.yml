name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk
          pip install buildozer cython
          
      - name: Build APK
        run: |
          mkdir -p ~/.buildozer
          echo 'y' | buildozer android debug deploy run
        env:
          BUILD_TYPE: debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyGame
          path: bin/*.apk
