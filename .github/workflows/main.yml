name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          
      - name: Install buildozer
        run: |
          pip install buildozer cython
          
      - name: Build APK
        run: |
          buildozer android debug deploy run
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyGame
          path: bin/*.apk
